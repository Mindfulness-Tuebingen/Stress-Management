<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stress Wheel — Self-Assessment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #FAF8F4;
    --surface: #FFFFFF;
    --border: #E4DFD4;
    --text: #2B2A27;
    --text-secondary: #6B6A64;
    --accent: #4A6B5C;
    --accent-light: #E8EFE9;
    --danger: #A3503E;
    --danger-light: #F7E9E5;
    --radius: 10px;
    --radius-lg: 16px;
    --font: 'Helvetica Neue', Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }
  .lang-switch {
    display: flex;
    gap: 6px;
  }
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .logo-link {
    display: flex;
    align-items: center;
    text-decoration: none;
  }
  .logo {
    width: 130px;
    height: auto;
    display: block;
  }
  .lang-switch button {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-secondary);
    cursor: pointer;
  }
  .lang-switch button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 0.5rem;
    letter-spacing: -0.01em;
  }
  .subtitle {
    color: var(--text-secondary);
    font-size: 15px;
    margin: 0 0 2.5rem;
  }
  .spoke-block {
    margin-bottom: 2rem;
  }
  .spoke-title {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 1rem;
    padding-bottom: 6px;
    border-bottom: 2px solid currentColor;
    display: inline-block;
  }
  .question {
    margin-bottom: 1.5rem;
  }
  .question label {
    display: block;
    font-size: 15px;
    margin-bottom: 10px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
  }
  .slider-val {
    min-width: 28px;
    text-align: right;
    font-weight: 600;
    font-size: 15px;
  }
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin: 2.5rem 0 2rem;
  }
  .chart-wrap {
    position: relative;
    height: 340px;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 1rem;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    flex: 1;
    background: var(--accent-light);
    border-radius: var(--radius);
    padding: 1rem;
    text-align: center;
  }
  .stat-card.danger { background: var(--danger-light); }
  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin: 0 0 4px;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 600;
    margin: 0;
  }
  .recommendations h2 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 1rem;
  }
  .rec-card {
    background: var(--danger-light);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 12px;
    border-left: 3px solid var(--danger);
  }
  .rec-card .rec-sub {
    font-size: 13px;
    font-weight: 600;
    color: var(--danger);
    margin: 0 0 4px;
  }
  .rec-card .rec-tool {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  .rec-card .rec-tool-entry {
    margin-bottom: 10px;
  }
  .rec-card .rec-tool-entry:last-child {
    margin-bottom: 0;
  }
  .rec-card .rec-instr {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 0;
    white-space: pre-line;
  }
  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .disclaimer {
    background: var(--accent-light);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 14px;
    color: var(--text);
    border-left: 3px solid var(--accent);
  }
  .emergency {
    background: var(--danger-light);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem;
    margin: 2rem 0;
    border-left: 3px solid var(--danger);
  }
  .emergency h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--danger);
    margin: 0 0 0.75rem;
  }
  .emergency ul {
    margin: 0;
    padding-left: 1.1rem;
    font-size: 14px;
  }
  .emergency li {
    margin-bottom: 6px;
  }
  .emergency a {
    color: var(--danger);
    font-weight: 600;
    text-decoration: none;
  }
  .emergency a:hover {
    text-decoration: underline;
  }
  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 12px;
    color: var(--text-secondary);
  }
  footer p {
    margin: 0 0 8px;
  }
  .footer-link a {
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
  }
  .footer-link a:hover {
    text-decoration: underline;
  }
</style>
</head>

let lang = 'en';

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = i18n[lang][el.dataset.i18n];
  });
  document.documentElement.lang = lang;
  renderEmergencyContacts();
}

function renderEmergencyContacts() {
  const list = document.getElementById('emergency-list');
  list.innerHTML = emergencyContacts[lang].map(c => `
    <li>${c.label}: <a href="tel:${c.phone.replace(/\s|-/g, '')}">${c.phone}</a></li>
  `).join('');
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-de').classList.toggle('active', l === 'de');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  applyI18n();
  buildQuestions();
  chart.data.labels = allItems.map(i => i.sub[lang]);
  chart.update();
  updateResults();
}

const allItems = spokes.flatMap(s => s.items.map(i => ({ ...i, spokeColor: s.color, spokeName: s.name })));

function buildQuestions() {
  const container = document.getElementById('questions');
  container.innerHTML = '';
  spokes.forEach(spoke => {
    const block = document.createElement('div');
    block.className = 'spoke-block';
    const heading = document.createElement('p');
    heading.className = 'spoke-title';
    heading.style.color = spoke.color;
    heading.textContent = spoke.name[lang];
    block.appendChild(heading);

    spoke.items.forEach(item => {
      const q = document.createElement('div');
      q.className = 'question';
      const label = document.createElement('label');
      label.setAttribute('for', item.id);
      label.textContent = item.label[lang];
      const row = document.createElement('div');
      row.className = 'slider-row';
      const slider = document.createElement('input');
      slider.type = 'range'; slider.min = 1; slider.max = 10; slider.step = 1;
      slider.id = item.id;
      slider.value = sliderValues[item.id] || 5;
      const out = document.createElement('span');
      out.className = 'slider-val';
      out.textContent = slider.value;
      slider.addEventListener('input', () => {
        out.textContent = slider.value;
        sliderValues[item.id] = parseInt(slider.value);
        updateResults();
      });
      row.appendChild(slider); row.appendChild(out);
      q.appendChild(label); q.appendChild(row);
      block.appendChild(q);
    });
    container.appendChild(block);
  });
}

const sliderValues = {};
allItems.forEach(i => sliderValues[i.id] = 5);

const ctx = document.getElementById('wheelChart');
const chart = new Chart(ctx, {
  type: 'radar',
  data: {
    labels: allItems.map(i => i.sub[lang]),
    datasets: [
      {
        label: 'Values',
        data: allItems.map(i => sliderValues[i.id]),
        borderColor: '#185FA5',
        backgroundColor: 'rgba(24,95,165,0.15)',
        pointBackgroundColor: '#185FA5',
        borderWidth: 2
      },
      {
        label: 'Attention zone',
        data: allItems.map(() => 7),
        borderColor: '#A32D2D',
        backgroundColor: 'transparent',
        borderDash: [4, 4],
        pointRadius: 0,
        borderWidth: 1.5
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      r: {
        min: 0, max: 10,
        ticks: { stepSize: 2, font: { size: 10 } },
        pointLabels: { font: { size: 10 } }
      }
    },
    plugins: { legend: { display: false } }
  }
});

function updateResults() {
  chart.data.datasets[0].data = allItems.map(i => sliderValues[i.id]);
  chart.update();

  const values = allItems.map(i => sliderValues[i.id]);
  const avg = values.reduce((a,b) => a+b, 0) / values.length;
  const dangerItems = allItems.filter(i => sliderValues[i.id] >= 7);

  document.getElementById('stat-avg').textContent = avg.toFixed(1);
  document.getElementById('stat-danger').textContent = dangerItems.length + ' / 12';

  const recList = document.getElementById('rec-list');
  if (dangerItems.length === 0) {
    recList.innerHTML = '<div class="empty-state">' + i18n[lang].recEmpty + '</div>';
  } else {
    recList.innerHTML = dangerItems.map(item => `
      <div class="rec-card" style="border-left-color:${item.spokeColor}">
        <p class="rec-sub" style="color:${item.spokeColor}">${item.sub[lang]}</p>
        ${item.tools.map(t => `
          <div class="rec-tool-entry">
            <p class="rec-tool">${t.tool[lang]}</p>
            ${t.instr ? `<p class="rec-instr">${t.instr[lang]}</p>` : ''}
          </div>
        `).join('')}
      </div>
    `).join('');
  }
}

buildQuestions();
applyI18n();
updateResults();
